<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オモコロリーダー</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --paper: #fdf6e3;
  --accent1: #ff6b35;
  --accent2: #4ecdc4;
  --accent3: #ffe66d;
  --manga: #f472b6;
  --radio: #34d399;
  --muted: #8a8a9a;
  --card: #ffffff;
  --border: #e0d8c8;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 10% 15%, rgba(255,107,53,.07) 0%, transparent 40%),
    radial-gradient(circle at 90% 85%, rgba(78,205,196,.07) 0%, transparent 40%),
    url("data:image/svg+xml,%3Csvg width='52' height='52' viewBox='0 0 52 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c8b89a' fill-opacity='0.1'%3E%3Ccircle cx='4' cy='4' r='1.5'/%3E%3Ccircle cx='30' cy='4' r='1.5'/%3E%3Ccircle cx='4' cy='30' r='1.5'/%3E%3Ccircle cx='30' cy='30' r='1.5'/%3E%3C/g%3E%3C/svg%3E");
}

header {
  background: var(--ink);
  position: sticky; top:0; z-index:200;
  box-shadow: 0 3px 0 var(--accent1);
}
.header-inner {
  max-width:1000px; margin:0 auto;
  display:flex; align-items:center; gap:12px;
  padding:10px 16px;
}
.logo-badge {
  background:var(--accent1); color:#fff;
  font-size:18px; font-weight:900;
  width:38px; height:38px; border-radius:10px;
  display:grid; place-items:center;
  transform:rotate(-3deg); flex-shrink:0;
}
.logo-text { color:#fff; font-size:14px; font-weight:700; line-height:1.3; }
.logo-text small { display:block; color:var(--accent3); font-size:9px; font-weight:400; letter-spacing:.1em; }
.refresh-btn {
  margin-left:auto;
  background:var(--accent2); color:var(--ink);
  border:none; border-radius:20px; padding:6px 14px;
  font-family:inherit; font-size:12px; font-weight:700;
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.refresh-btn:hover { background:var(--accent3); transform:scale(1.05); }
.refresh-btn.spin { opacity:.6; pointer-events:none; }

.tabs {
  background:#fff; border-bottom:2px solid var(--border);
  position:sticky; top:58px; z-index:190;
}
.tabs-inner {
  max-width:1000px; margin:0 auto;
  display:flex; padding:0 12px;
}
.tab-btn {
  background:none; border:none; border-bottom:3px solid transparent;
  padding:12px 16px; margin-bottom:-2px;
  font-family:inherit; font-size:13px; font-weight:700;
  cursor:pointer; color:var(--muted);
  transition:all .15s; white-space:nowrap;
  display:flex; align-items:center; gap:6px;
}
.tab-dot { width:8px; height:8px; border-radius:50%; opacity:.6; }
.tab-btn:hover { color:var(--ink); }
.tab-btn.active { color:var(--ink); border-bottom-color:var(--accent1); }
.tab-btn[data-tab="articles"] .tab-dot { background:var(--accent1); }
.tab-btn[data-tab="manga"] .tab-dot { background:var(--manga); }
.tab-btn[data-tab="radio"] .tab-dot { background:var(--radio); }
.cnt { background:var(--accent3); color:var(--ink); font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; display:none; }

main { max-width:1000px; margin:0 auto; padding:20px 16px; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

.status-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; font-size:11px; color:var(--muted); }
.pulse { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--accent2); margin-right:5px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Article grid */
.articles-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(270px, 1fr)); gap:14px; }
.articles-grid .article-card:first-child { grid-column:1/-1; display:flex; gap:18px; }
.articles-grid .article-card:first-child .card-thumb { width:240px; flex-shrink:0; height:160px; }
.articles-grid .article-card:first-child .card-title { font-size:18px; }
.article-card {
  background:var(--card); border:2px solid var(--border); border-radius:14px;
  overflow:hidden; cursor:pointer; text-decoration:none; color:inherit; display:block;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, border-color .2s;
  opacity:0; animation:fadeUp .4s forwards;
}
.article-card:hover { transform:translateY(-4px) rotate(.3deg); border-color:var(--accent1); box-shadow:5px 5px 0 var(--accent1); }
.card-thumb { width:100%; height:150px; overflow:hidden; background:linear-gradient(135deg,#f0e8d5,#e0d8c5); position:relative; }
.card-thumb img { width:100%; height:100%; object-fit:cover; transition:transform .3s; }
.article-card:hover .card-thumb img { transform:scale(1.05); }
.thumb-ph { width:100%; height:100%; display:grid; place-items:center; font-size:38px; }
.card-tag { position:absolute; top:8px; left:8px; color:#fff; font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
.tag-article { background:var(--accent1); }
.tag-manga { background:var(--manga); }
.card-body { padding:12px; }
.card-title { font-size:13px; font-weight:700; line-height:1.5; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.card-meta { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
.card-author { font-weight:700; color:var(--accent1); }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.article-card:nth-child(1){animation-delay:.05s} .article-card:nth-child(2){animation-delay:.10s}
.article-card:nth-child(3){animation-delay:.15s} .article-card:nth-child(4){animation-delay:.20s}
.article-card:nth-child(5){animation-delay:.25s} .article-card:nth-child(n+6){animation-delay:.30s}

/* Radio */
.radio-layout { display:grid; grid-template-columns:280px 1fr; gap:20px; align-items:start; }
@media(max-width:700px){ .radio-layout{grid-template-columns:1fr;} }

.show-list { display:flex; flex-direction:column; gap:8px; }
.show-card {
  background:var(--card); border:2px solid var(--border); border-radius:12px;
  padding:12px; cursor:pointer; transition:all .15s;
  display:flex; gap:10px; align-items:center;
}
.show-card:hover { border-color:var(--radio); transform:translateX(3px); }
.show-card.active { border-color:var(--radio); background:rgba(52,211,153,.06); box-shadow:3px 3px 0 var(--radio); }
.show-thumb { width:52px; height:52px; border-radius:10px; object-fit:cover; flex-shrink:0; background:linear-gradient(135deg,#d4f5ec,#c084fc22); }
.show-info { flex:1; min-width:0; }
.show-title { font-size:12px; font-weight:700; line-height:1.4; margin-bottom:3px; }
.show-author { font-size:10px; color:var(--muted); }
.show-badge { background:var(--radio); color:#fff; font-size:9px; font-weight:700; padding:2px 6px; border-radius:6px; display:inline-block; margin-top:4px; }
.show-ended { background:var(--muted); color:#fff; font-size:9px; font-weight:700; padding:2px 6px; border-radius:6px; display:inline-block; margin-top:4px; }

.player-panel { position:sticky; top:120px; }
.player-header { background:var(--ink); color:#fff; border-radius:14px 14px 0 0; padding:16px; display:flex; gap:12px; align-items:center; }
.player-show-thumb { width:56px; height:56px; border-radius:10px; object-fit:cover; flex-shrink:0; }
.player-show-title { font-size:13px; font-weight:700; line-height:1.4; }
.player-show-author { font-size:11px; color:#aaa; margin-top:2px; }
.player-controls { background:#fff; border:2px solid var(--ink); border-top:none; padding:14px; }
.player-ep-title { font-size:12px; font-weight:700; margin-bottom:4px; }
.player-ep-num { font-size:10px; color:var(--muted); margin-bottom:12px; }
audio { width:100%; border-radius:8px; margin-bottom:10px; accent-color:var(--radio); }
.player-nav { display:flex; gap:8px; margin-bottom:10px; }
.nav-btn { flex:1; background:var(--ink); color:#fff; border:none; border-radius:8px; padding:8px 4px; font-family:inherit; font-size:11px; font-weight:700; cursor:pointer; transition:all .15s; }
.nav-btn:hover { background:#333; }
.nav-btn:disabled { background:var(--border); color:var(--muted); cursor:default; }
.nav-btn.g { background:var(--radio); color:var(--ink); }
.nav-btn.g:hover { background:#2ab885; }
.nav-btn.g:disabled { background:var(--border); color:var(--muted); }
.autoplay-row { display:flex; align-items:center; gap:8px; font-size:11px; font-weight:700; color:var(--muted); }
.toggle { position:relative; width:36px; height:20px; cursor:pointer; }
.toggle input { opacity:0; width:0; height:0; }
.slider { position:absolute; inset:0; background:var(--border); border-radius:20px; transition:.2s; }
.slider::before { content:''; position:absolute; width:14px; height:14px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
.toggle input:checked + .slider { background:var(--radio); }
.toggle input:checked + .slider::before { transform:translateX(16px); }

.ep-list-header { display:flex; align-items:center; justify-content:space-between; margin:16px 0 10px; }
.ep-list-title { font-size:13px; font-weight:900; }
.ep-count { font-size:11px; color:var(--muted); }
.ep-search { width:100%; border:2px solid var(--border); border-radius:8px; padding:7px 10px; font-family:inherit; font-size:12px; margin-bottom:10px; outline:none; transition:border-color .15s; }
.ep-search:focus { border-color:var(--radio); }
.ep-list { display:flex; flex-direction:column; gap:4px; max-height:400px; overflow-y:auto; padding-right:4px; }
.ep-list::-webkit-scrollbar { width:4px; }
.ep-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.ep-item { background:var(--card); border:2px solid var(--border); border-radius:10px; padding:10px 12px; cursor:pointer; transition:all .15s; display:flex; gap:10px; align-items:flex-start; }
.ep-item:hover { border-color:var(--radio); }
.ep-item.active { border-color:var(--radio); background:rgba(52,211,153,.08); }
.ep-num { font-size:11px; font-weight:900; color:var(--radio); min-width:28px; flex-shrink:0; text-align:right; padding-top:1px; }
.ep-info { flex:1; min-width:0; }
.ep-title { font-size:11px; font-weight:700; line-height:1.4; }
.ep-date { font-size:10px; color:var(--muted); margin-top:2px; }
.ep-now { display:none; font-size:10px; color:var(--radio); margin-top:2px; font-weight:700; }
.ep-item.active .ep-now { display:block; }
.ep-item.active .ep-date { display:none; }

.radio-placeholder { background:var(--card); border:2px dashed var(--border); border-radius:14px; padding:60px 20px; text-align:center; color:var(--muted); }
.big-emoji { font-size:48px; margin-bottom:12px; }
.loading-state { text-align:center; padding:50px 20px; }
.spinner { display:inline-block; width:40px; height:40px; border:4px solid var(--border); border-top-color:var(--accent1); border-radius:50%; animation:spin .7s linear infinite; margin-bottom:12px; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:13px; color:var(--muted); font-weight:700; }
.error-state { text-align:center; padding:50px 20px; }
.error-emoji { font-size:44px; margin-bottom:10px; }
.error-title { font-size:16px; font-weight:900; color:var(--accent1); margin-bottom:6px; }
.error-msg { font-size:12px; color:var(--muted); line-height:1.6; margin-bottom:16px; }
.retry-btn { background:var(--accent1); color:#fff; border:none; border-radius:20px; padding:9px 22px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }

@media(max-width:600px){
  .articles-grid .article-card:first-child { flex-direction:column; }
  .articles-grid .article-card:first-child .card-thumb { width:100%; height:180px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="https://omocoro.jp" target="_blank" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <div class="logo-badge">オ</div>
      <div class="logo-text">オモコロリーダー <small>OMOCORO READER</small></div>
    </a>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">↻ 更新</button>
  </div>
</header>

<div class="tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" data-tab="articles" onclick="switchTab('articles',this)">
      <span class="tab-dot"></span>特集記事<span class="cnt" id="cntArticle"></span>
    </button>
    <button class="tab-btn" data-tab="manga" onclick="switchTab('manga',this)">
      <span class="tab-dot"></span>漫画<span class="cnt" id="cntManga"></span>
    </button>
    <button class="tab-btn" data-tab="radio" onclick="switchTab('radio',this)">
      <span class="tab-dot"></span>ラジオ
    </button>
  </div>
</div>

<main>
  <div class="tab-panel active" id="panel-articles">
    <div class="status-bar">
      <div id="stArticle"><span class="pulse"></span>読み込み中...</div>
      <div id="ctArticle"></div>
    </div>
    <div id="conArticle">
      <div class="loading-state"><div class="spinner"></div><div class="loading-text">記事を読み込み中...</div></div>
    </div>
  </div>

  <div class="tab-panel" id="panel-manga">
    <div class="status-bar">
      <div id="stManga"><span class="pulse"></span>読み込み中...</div>
      <div id="ctManga"></div>
    </div>
    <div id="conManga">
      <div class="loading-state"><div class="spinner"></div><div class="loading-text">漫画を読み込み中...</div></div>
    </div>
  </div>

  <div class="tab-panel" id="panel-radio">
    <div class="radio-layout">
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;">番組を選ぶ</div>
        <div id="showList">
          <div class="loading-state"><div class="spinner"></div><div class="loading-text">番組を読み込み中...</div></div>
        </div>
      </div>
      <div id="playerPanel">
        <div class="radio-placeholder">
          <div class="big-emoji">🎙️</div>
          <p style="font-size:13px;font-weight:700;">左の番組を選んで<br>第1回から聴こう！</p>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const PROXY = 'https://api.allorigins.win/get?url=';
const LIST_URL = 'https://arrow2nd.github.io/omkr-radio/list.json';
const EP_BASE  = 'https://arrow2nd.github.io/omkr-radio/episodes/';

const MANGA_KW = ['漫画','マンガ','まんが','コマ漫画','4コマ','8コマ','ポテン生活','ラジオ漫画犬','キューライス','めごちも','ニャロメロン','鴻池','comic','manga'];
const RADIO_KW = ['ラジオ','匿名ラジオ','モンフィー','音声放送','オモコロウォッチ','ありスパ','かまみく','podcast','【0','【1','【2','【3','【4','【5'];

let articles=[], manga=[], shows=[];
let curShow=null, curIdx=0, autoplay=true;

// ── helpers ──
const EMOJIS = ['😂','🤣','😱','🎉','💥','🔥','✨','😎','🤔','😭','🍺','🐱','🦆','🌈','💀','🎮','🍣','🤖','👻','🎪'];
const emojiFor = s => EMOJIS[(s||'').charCodeAt(0) % EMOJIS.length];
function fmtDate(d) {
  if(!(d instanceof Date)||isNaN(d)) return '';
  const diff = Math.floor((Date.now()-d)/86400000);
  if(diff===0) return '今日'; if(diff===1) return '昨日'; if(diff<7) return diff+'日前';
  return (d.getMonth()+1)+'/'+(d.getDate());
}
function setHTML(id, html) { const el=document.getElementById(id); if(el) el.innerHTML=html; }
function getText(id) { const el=document.getElementById(id); return el?el.value:''; }

// ── RSS ──
async function fetchRSS(url) {
  const res = await fetch(PROXY+encodeURIComponent(url));
  const j = await res.json();
  const doc = new DOMParser().parseFromString(j.contents,'text/xml');
  return Array.from(doc.querySelectorAll('item'));
}

function parseItem(item) {
  const title   = item.querySelector('title')?.textContent.trim()||'';
  const link    = item.querySelector('link')?.textContent.trim()||'#';
  const pubDate = new Date(item.querySelector('pubDate')?.textContent||'');
  const cat     = Array.from(item.querySelectorAll('category')).map(c=>c.textContent.trim()).join(' ');
  const author  = item.querySelector('dc\\:creator,creator,author')?.textContent.trim()||'';
  const image   = extractImg(item);
  return {title,link,pubDate,cat,author,image};
}

function extractImg(item) {
  const m = item.querySelector('thumbnail,enclosure[type*="image"]');
  if(m) return m.getAttribute('url')||m.getAttribute('href');
  for(const s of ['encoded','description']) {
    const el=item.querySelector(s);
    if(el){ const r=el.textContent.match(/src=["']([^"']+\.(jpe?g|png|gif|webp))/i); if(r) return r[1]; }
  }
  return null;
}

function isManga(it) { const h=(it.title+it.cat).toLowerCase(); return MANGA_KW.some(k=>h.includes(k.toLowerCase())); }
function isRadio(it) { const h=(it.title+it.cat).toLowerCase(); return RADIO_KW.some(k=>h.includes(k.toLowerCase())); }

// ── LOAD ARTICLES ──
async function loadArticles() {
  try {
    const items = (await fetchRSS('https://omocoro.jp/feed')).map(parseItem).filter(i=>i.title);
    items.sort((a,b)=>b.pubDate-a.pubDate);
    manga    = items.filter(i=>isManga(i));
    articles = items.filter(i=>!isManga(i)&&!isRadio(i));

    renderGrid('conArticle',articles,'article');
    renderGrid('conManga',manga,'manga');

    const t = new Date(); const ts=`${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
    setHTML('stArticle',`<span class="pulse"></span>更新: ${ts}`);
    setHTML('stManga',  `<span class="pulse"></span>更新: ${ts}`);
    setHTML('ctArticle',`<span style="background:var(--accent3);color:var(--ink);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;">${articles.length}件</span>`);
    setHTML('ctManga',  `<span style="background:var(--accent3);color:var(--ink);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;">${manga.length}件</span>`);

    const ca=document.getElementById('cntArticle'), cm=document.getElementById('cntManga');
    if(ca){ca.textContent=articles.length;ca.style.display='';}
    if(cm){cm.textContent=manga.length;cm.style.display='';}
  } catch(e) {
    setHTML('conArticle',errHTML(loadArticles));
    setHTML('conManga',  errHTML(loadArticles));
    setHTML('stArticle','<span style="color:var(--accent1)">⚠ エラー</span>');
    setHTML('stManga',  '<span style="color:var(--accent1)">⚠ エラー</span>');
  }
}

function errHTML(fn) {
  return `<div class="error-state">
    <div class="error-emoji">😵</div>
    <div class="error-title">読み込みに失敗</div>
    <div class="error-msg">しばらく待ってから再試行してください。</div>
    <button class="retry-btn" onclick="(${fn.toString()})()">もう一度試す</button>
  </div>`;
}

function renderGrid(containerId, items, type) {
  if(!items.length){
    setHTML(containerId,`<div class="error-state"><div class="error-emoji">🔍</div><div class="error-title">記事がありません</div></div>`);
    return;
  }
  const g=document.createElement('div'); g.className='articles-grid';
  items.forEach(item=>{
    const a=document.createElement('a');
    a.href=item.link; a.target='_blank'; a.rel='noopener'; a.className='article-card';
    const tg=type==='manga'?'tag-manga':'tag-article';
    const lb=type==='manga'?'漫画':'特集';
    const th=item.image
      ?`<img src="${item.image}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=thumb-ph>${emojiFor(item.title)}</div>'">`
      :`<div class="thumb-ph">${emojiFor(item.title)}</div>`;
    const meta=[
      item.author?`<span class="card-author">${item.author}</span>`:'',
      item.pubDate>new Date(0)?`<span>${fmtDate(item.pubDate)}</span>`:''
    ].filter(Boolean).join('<span style="color:var(--muted)">·</span>');
    a.innerHTML=`
      <div class="card-thumb">${th}<span class="card-tag ${tg}">${lb}</span></div>
      <div class="card-body">
        <div class="card-title">${item.title}</div>
        <div class="card-meta">${meta}</div>
      </div>`;
    g.appendChild(a);
  });
  const c=document.getElementById(containerId); c.innerHTML=''; c.appendChild(g);
}

// ── RADIO ──
async function loadRadioShows() {
  try {
    const res=await fetch(LIST_URL);
    shows=await res.json();
    renderShowList();
  } catch(e) {
    setHTML('showList',errHTML(loadRadioShows));
  }
}

function renderShowList() {
  const d=document.createElement('div'); d.className='show-list';
  shows.forEach(s=>{
    const c=document.createElement('div');
    c.className='show-card'; c.dataset.id=s.id;
    c.onclick=()=>selectShow(s,c);
    c.innerHTML=`
      <img class="show-thumb" src="${s.thumbnail||''}" alt="" onerror="this.style.display='none'">
      <div class="show-info">
        <div class="show-title">${s.title}</div>
        <div class="show-author">${s.author||''}</div>
        ${s.nowOnAir?'<span class="show-badge">配信中</span>':'<span class="show-ended">終了</span>'}
      </div>`;
    d.appendChild(c);
  });
  const sl=document.getElementById('showList'); sl.innerHTML=''; sl.appendChild(d);
}

async function selectShow(show, cardEl) {
  document.querySelectorAll('.show-card').forEach(c=>c.classList.remove('active'));
  cardEl.classList.add('active');
  setHTML('playerPanel','<div class="loading-state"><div class="spinner"></div><div class="loading-text">エピソード読み込み中...</div></div>');
  try {
    const res=await fetch(EP_BASE+show.id+'.json');
    const eps=await res.json();
    eps.sort((a,b)=>(a.number||0)-(b.number||0));
    curShow={show,eps}; curIdx=0;
    renderPlayer();
    playEp(0);
  } catch(e) {
    setHTML('playerPanel','<div class="radio-placeholder"><div class="big-emoji">😵</div><p style="font-size:13px;font-weight:700;">エピソードの取得に失敗</p></div>');
  }
}

function renderPlayer() {
  const {show,eps}=curShow;
  const pp=document.getElementById('playerPanel');
  pp.innerHTML=`
    <div class="player-header">
      <img class="player-show-thumb" src="${show.thumbnail||''}" alt="" onerror="this.style.display='none'">
      <div>
        <div class="player-show-title">${show.title}</div>
        <div class="player-show-author">${show.author||''}</div>
      </div>
    </div>
    <div class="player-controls">
      <div class="player-ep-title" id="pEpTitle">-</div>
      <div class="player-ep-num"   id="pEpNum"></div>
      <audio id="audioEl" controls preload="none" style="width:100%;border-radius:8px;margin-bottom:10px;accent-color:var(--radio);"></audio>
      <div class="player-nav">
        <button class="nav-btn" id="btnPrev" onclick="playPrev()">◀ 前へ</button>
        <button class="nav-btn g" id="btnNext" onclick="playNext()">次へ ▶</button>
      </div>
      <div class="autoplay-row">
        <label class="toggle">
          <input type="checkbox" id="apToggle" ${autoplay?'checked':''} onchange="autoplay=this.checked">
          <span class="slider"></span>
        </label>
        連続再生（自動的に次へ）
      </div>
    </div>
    <div style="margin-top:16px;">
      <div class="ep-list-header">
        <span class="ep-list-title">エピソード一覧</span>
        <span class="ep-count">${eps.length}回</span>
      </div>
      <input type="text" class="ep-search" id="epSearch" placeholder="🔍 タイトルで絞り込み..." oninput="filterEps(this.value)">
      <div class="ep-list" id="epListEl"></div>
    </div>`;

  const audio=document.getElementById('audioEl');
  audio.addEventListener('ended',()=>{ if(autoplay) playNext(); });

  renderEpList(eps);
}

function renderEpList(filtered) {
  const el=document.getElementById('epListEl'); if(!el) return;
  el.innerHTML='';
  filtered.forEach(ep=>{
    const origIdx=curShow.eps.indexOf(ep);
    const d=document.createElement('div');
    d.className='ep-item'+(origIdx===curIdx?' active':'');
    d.id='ep-'+origIdx;
    d.onclick=()=>playEp(origIdx);
    d.innerHTML=`
      <div class="ep-num">#${ep.number||origIdx+1}</div>
      <div class="ep-info">
        <div class="ep-title">${ep.title}</div>
        <div class="ep-date">${fmtDate(new Date(ep.pubDate||''))}</div>
        <div class="ep-now">▶ 再生中</div>
      </div>`;
    el.appendChild(d);
  });
}

function filterEps(q) {
  if(!curShow) return;
  const lq=q.toLowerCase();
  renderEpList(lq ? curShow.eps.filter(e=>e.title.toLowerCase().includes(lq)) : curShow.eps);
}

function playEp(idx) {
  if(!curShow) return;
  const {eps}=curShow;
  if(idx<0||idx>=eps.length) return;
  curIdx=idx;
  const ep=eps[idx];
  const titleEl=document.getElementById('pEpTitle');
  const numEl  =document.getElementById('pEpNum');
  const prev   =document.getElementById('btnPrev');
  const next   =document.getElementById('btnNext');
  const audio  =document.getElementById('audioEl');
  if(titleEl) titleEl.textContent=ep.title||'-';
  if(numEl)   numEl.textContent=`第${ep.number||idx+1}回 / 全${eps.length}回`;
  if(prev) prev.disabled=(idx===0);
  if(next) next.disabled=(idx===eps.length-1);
  document.querySelectorAll('.ep-item').forEach(e=>e.classList.remove('active'));
  const epEl=document.getElementById('ep-'+idx);
  if(epEl){epEl.classList.add('active'); epEl.scrollIntoView({behavior:'smooth',block:'nearest'});}
  if(audio&&ep.source){ audio.src=ep.source; audio.play().catch(()=>{}); }
}

function playNext(){ if(curShow&&curIdx<curShow.eps.length-1) playEp(curIdx+1); }
function playPrev(){ if(curIdx>0) playEp(curIdx-1); }

// ── TABS ──
function switchTab(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

// ── REFRESH ──
async function refreshAll(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spin'); btn.textContent='読込中...';
  await Promise.all([loadArticles(),loadRadioShows()]);
  btn.classList.remove('spin'); btn.textContent='↻ 更新';
}

loadArticles();
loadRadioShows();
</script>
</body>
</html>
