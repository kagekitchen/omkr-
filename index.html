<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オモコロラジオ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --bg: #f0faf7;
  --green: #34d399;
  --green2: #059669;
  --yellow: #fde68a;
  --pink: #f9a8d4;
  --card: #ffffff;
  --border: #d1fae5;
  --muted: #6b7280;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 160px;
}

/* Header */
header {
  background: var(--ink);
  padding: 12px 16px;
  position: sticky; top:0; z-index:100;
  box-shadow: 0 3px 0 var(--green);
  display: flex; align-items: center; gap: 10px;
}
.logo-badge {
  background: var(--green); color: var(--ink);
  font-size:16px; font-weight:900;
  width:36px; height:36px; border-radius:10px;
  display:grid; place-items:center;
  transform:rotate(-3deg); flex-shrink:0;
  box-shadow: 2px 2px 0 var(--green2);
}
.logo-text { color:#fff; font-size:14px; font-weight:700; line-height:1.3; }
.logo-text small { display:block; color:var(--yellow); font-size:9px; letter-spacing:.1em; }

/* Now playing bar */
.now-playing {
  background: var(--ink);
  border-top: 2px solid var(--green);
  position: fixed; bottom:0; left:0; right:0; z-index:200;
  padding: 10px 16px 20px;
  display: none;
}
.now-playing.visible { display: block; }
.np-show { font-size:10px; color:var(--green); font-weight:700; margin-bottom:2px; }
.np-title { font-size:12px; color:#fff; font-weight:700; margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.np-controls { display:flex; align-items:center; gap:8px; }
.np-btn {
  background: var(--green); color: var(--ink);
  border:none; border-radius:8px;
  width:36px; height:36px;
  font-size:14px; cursor:pointer;
  display:grid; place-items:center;
  flex-shrink:0; font-weight:900;
  transition: all .15s;
}
.np-btn:hover { background: #2ab885; transform:scale(1.05); }
.np-btn:disabled { background:var(--border); color:var(--muted); }
audio {
  flex:1; height:36px; border-radius:8px;
  accent-color: var(--green);
}
.np-auto {
  display:flex; align-items:center; gap:6px;
  font-size:10px; color:#aaa; font-weight:700;
  flex-shrink:0;
}
.toggle { position:relative; width:30px; height:17px; cursor:pointer; }
.toggle input { opacity:0; width:0; height:0; }
.slider { position:absolute; inset:0; background:#444; border-radius:20px; transition:.2s; }
.slider::before { content:''; position:absolute; width:11px; height:11px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
.toggle input:checked + .slider { background:var(--green); }
.toggle input:checked + .slider::before { transform:translateX(13px); }

/* Main layout */
main { max-width:700px; margin:0 auto; padding:16px; }

/* Show grid */
.section-title {
  font-size:13px; font-weight:900; color:var(--muted);
  margin-bottom:12px; display:flex; align-items:center; gap:6px;
}
.section-title::before { content:''; display:block; width:4px; height:16px; background:var(--green); border-radius:2px; }

.show-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}
.show-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  cursor: pointer;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
  text-align: center;
}
.show-card:hover { transform:translateY(-3px); border-color:var(--green); box-shadow:3px 3px 0 var(--green); }
.show-card.active { border-color:var(--green); background:rgba(52,211,153,.08); box-shadow:3px 3px 0 var(--green); }
.show-thumb {
  width:72px; height:72px; border-radius:12px; object-fit:cover;
  margin:0 auto 8px; display:block;
  background:linear-gradient(135deg,#d1fae5,#a7f3d0);
}
.show-name { font-size:11px; font-weight:700; line-height:1.4; margin-bottom:4px; }
.show-author { font-size:9px; color:var(--muted); }
.show-badge { display:inline-block; margin-top:4px; font-size:9px; font-weight:700; padding:2px 6px; border-radius:6px; }
.badge-on { background:var(--green); color:var(--ink); }
.badge-off { background:#e5e7eb; color:var(--muted); }

/* Episode panel */
.ep-panel {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  display: none;
}
.ep-panel.visible { display: block; }

.ep-panel-header {
  background: var(--ink);
  padding: 14px 16px;
  display: flex; gap: 12px; align-items: center;
}
.ep-panel-thumb {
  width:48px; height:48px; border-radius:10px; object-fit:cover; flex-shrink:0;
}
.ep-panel-title { font-size:13px; font-weight:700; color:#fff; line-height:1.4; }
.ep-panel-author { font-size:10px; color:#aaa; margin-top:2px; }

.ep-panel-body { padding:14px; }
.ep-search {
  width:100%; border:2px solid var(--border); border-radius:10px;
  padding:8px 12px; font-family:inherit; font-size:12px;
  outline:none; transition:border-color .15s; margin-bottom:10px;
}
.ep-search:focus { border-color:var(--green); }

.ep-list-header {
  display:flex; justify-content:space-between; align-items:center;
  font-size:11px; color:var(--muted); font-weight:700; margin-bottom:8px;
}

.ep-list {
  display:flex; flex-direction:column; gap:4px;
  max-height:50vh; overflow-y:auto; padding-right:2px;
}
.ep-list::-webkit-scrollbar { width:4px; }
.ep-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.ep-item {
  display:flex; gap:10px; align-items:flex-start;
  padding:10px 12px;
  border:2px solid var(--border); border-radius:10px;
  cursor:pointer; transition:all .15s;
}
.ep-item:hover { border-color:var(--green); background:rgba(52,211,153,.04); }
.ep-item.active { border-color:var(--green); background:rgba(52,211,153,.10); }
.ep-num { font-size:11px; font-weight:900; color:var(--green); min-width:26px; text-align:right; padding-top:1px; flex-shrink:0; }
.ep-info { flex:1; min-width:0; }
.ep-title { font-size:11px; font-weight:700; line-height:1.4; }
.ep-meta { font-size:10px; color:var(--muted); margin-top:2px; }
.ep-now { display:none; font-size:10px; color:var(--green); font-weight:700; }
.ep-item.active .ep-now { display:block; }
.ep-item.active .ep-meta { display:none; }

/* Loading / Error */
.loading-state { text-align:center; padding:40px 20px; }
.spinner { display:inline-block; width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; margin-bottom:10px; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:12px; color:var(--muted); font-weight:700; }
.error-box { background:#fef2f2; border:2px solid #fca5a5; border-radius:12px; padding:16px; text-align:center; margin-top:8px; }
.error-box p { font-size:12px; color:#dc2626; font-weight:700; margin-bottom:10px; }
.retry-btn { background:var(--green); color:var(--ink); border:none; border-radius:20px; padding:7px 18px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; }
</style>
</head>
<body>

<header>
  <div class="logo-badge">🎙</div>
  <div class="logo-text">オモコロラジオ <small>OMOCORO RADIO PLAYER</small></div>
</header>

<main>
  <div id="onairSection">
    <div class="section-title">配信中の番組</div>
    <div id="onairGrid" class="show-grid">
      <div class="loading-state"><div class="spinner"></div><div class="loading-text">読み込み中...</div></div>
    </div>
  </div>

  <div id="endedSection">
    <div class="section-title">終了した番組</div>
    <div id="endedGrid" class="show-grid"></div>
  </div>

  <div class="ep-panel" id="epPanel">
    <div class="ep-panel-header">
      <img class="ep-panel-thumb" id="epPanelThumb" src="" alt="">
      <div>
        <div class="ep-panel-title" id="epPanelTitle"></div>
        <div class="ep-panel-author" id="epPanelAuthor"></div>
      </div>
    </div>
    <div class="ep-panel-body">
      <input type="text" class="ep-search" id="epSearch" placeholder="🔍 エピソードを検索..." oninput="filterEps(this.value)">
      <div class="ep-list-header">
        <span>第1回から順に並んでいます</span>
        <span id="epCount"></span>
      </div>
      <div class="ep-list" id="epList"></div>
    </div>
  </div>
</main>

<!-- Now Playing Bar -->
<div class="now-playing" id="nowPlaying">
  <div class="np-show" id="npShow"></div>
  <div class="np-title" id="npTitle"></div>
  <div class="np-controls">
    <button class="np-btn" id="btnPrev" onclick="playPrev()" title="前へ">◀</button>
    <audio id="audioEl" controls preload="none"></audio>
    <button class="np-btn" id="btnNext" onclick="playNext()" title="次へ">▶</button>
    <div class="np-auto">
      <label class="toggle">
        <input type="checkbox" id="autoToggle" checked onchange="autoplay=this.checked">
        <span class="slider"></span>
      </label>
      連続
    </div>
  </div>
</div>

<script>
const LIST_URL   = 'https://arrow2nd.github.io/omkr-radio/list.json';
const RSS_BASE   = 'https://arrow2nd.github.io/omkr-radio/podcast/';

let shows = [], curShow = null, curEps = [], curIdx = 0, autoplay = true;
const audio = document.getElementById('audioEl');
audio.addEventListener('ended', () => { if(autoplay) playNext(); });

function fmtDate(str) {
  if(!str) return '';
  const d = new Date(str);
  if(isNaN(d)) return '';
  const diff = Math.floor((Date.now()-d)/86400000);
  if(diff===0) return '今日'; if(diff===1) return '昨日'; if(diff<7) return diff+'日前';
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

// ── LOAD SHOWS ──
async function loadShows() {
  try {
    const res = await fetch(LIST_URL);
    shows = await res.json();
    renderShows();
  } catch(e) {
    document.getElementById('onairGrid').innerHTML = `
      <div class="error-box">
        <p>読み込みに失敗しました😵</p>
        <button class="retry-btn" onclick="loadShows()">もう一度試す</button>
      </div>`;
  }
}

function renderShows() {
  const onair = shows.filter(s=>s.nowOnAir);
  const ended = shows.filter(s=>!s.nowOnAir);
  renderShowGrid('onairGrid', onair);
  if(ended.length > 0) {
    renderShowGrid('endedGrid', ended);
    document.getElementById('endedSection').style.display = '';
  } else {
    document.getElementById('endedSection').style.display = 'none';
  }
}

function renderShowGrid(id, list) {
  const g = document.getElementById(id);
  g.innerHTML = '';
  list.forEach(s => {
    const d = document.createElement('div');
    d.className = 'show-card';
    d.dataset.id = s.id;
    d.onclick = () => selectShow(s, d);
    d.innerHTML = `
      <img class="show-thumb" src="${s.thumbnail||''}" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22/>'">
      <div class="show-name">${s.title}</div>
      <div class="show-author">${s.author||''}</div>
      <span class="show-badge ${s.nowOnAir?'badge-on':'badge-off'}">${s.nowOnAir?'配信中':'終了'}</span>`;
    g.appendChild(d);
  });
}

// ── SELECT SHOW ──
async function selectShow(show, cardEl) {
  document.querySelectorAll('.show-card').forEach(c=>c.classList.remove('active'));
  cardEl.classList.add('active');

  const panel = document.getElementById('epPanel');
  panel.classList.add('visible');
  document.getElementById('epList').innerHTML = '<div class="loading-state"><div class="spinner"></div><div class="loading-text">読み込み中...</div></div>';
  document.getElementById('epPanelThumb').src = show.thumbnail||'';
  document.getElementById('epPanelTitle').textContent = show.title;
  document.getElementById('epPanelAuthor').textContent = show.author||'';
  document.getElementById('epSearch').value = '';

  // スクロール
  setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'start'}), 100);

  try {
    const rssUrl = RSS_BASE + show.id + '.rss';
    const res = await fetch(rssUrl);
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'text/xml');
    const items = Array.from(doc.querySelectorAll('item'));
    if(items.length === 0) throw new Error('no items');

    curEps = items.map((item, i) => {
      const title     = item.querySelector('title')?.textContent.trim() || ('第'+(i+1)+'回');
      const enclosure = item.querySelector('enclosure');
      const source    = enclosure?.getAttribute('url') || '';
      const pubDate   = item.querySelector('pubDate')?.textContent || '';
      const numMatch  = title.match(/[\u3010\[#](\d+)[\u3011\]]/);
      const number    = numMatch ? parseInt(numMatch[1]) : (items.length - i);
      return { title, source, pubDate, number };
    });
    curEps.sort((a,b) => a.number - b.number);
    curShow = show;
    document.getElementById('epCount').textContent = curEps.length + '回';
    renderEpList(curEps);
    playEp(0);
  } catch(e) {
    document.getElementById('epList').innerHTML = `
      <div class="error-box">
        <p>エピソードの取得に失敗しました😵</p>
        <button class="retry-btn" onclick="selectShow(curShow, document.querySelector('.show-card.active'))">もう一度試す</button>
      </div>`;
  }
}

// ── RENDER EP LIST ──
function renderEpList(eps) {
  const list = document.getElementById('epList');
  list.innerHTML = '';
  eps.forEach(ep => {
    const origIdx = curEps.indexOf(ep);
    const d = document.createElement('div');
    d.className = 'ep-item' + (origIdx===curIdx?' active':'');
    d.id = 'ep-' + origIdx;
    d.onclick = () => playEp(origIdx);
    d.innerHTML = `
      <div class="ep-num">#${ep.number||origIdx+1}</div>
      <div class="ep-info">
        <div class="ep-title">${ep.title}</div>
        <div class="ep-meta">${fmtDate(ep.pubDate)}</div>
        <div class="ep-now">▶ 再生中</div>
      </div>`;
    list.appendChild(d);
  });
}

function filterEps(q) {
  const lq = q.toLowerCase();
  renderEpList(lq ? curEps.filter(e=>e.title.toLowerCase().includes(lq)) : curEps);
}

// ── PLAY ──
function playEp(idx) {
  if(idx < 0 || idx >= curEps.length) return;
  curIdx = idx;
  const ep = curEps[idx];

  // エピソードリスト更新
  document.querySelectorAll('.ep-item').forEach(e=>e.classList.remove('active'));
  const epEl = document.getElementById('ep-'+idx);
  if(epEl) { epEl.classList.add('active'); epEl.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  // ナウプレイ更新
  document.getElementById('nowPlaying').classList.add('visible');
  document.getElementById('npShow').textContent = curShow.title;
  document.getElementById('npTitle').textContent = `#${ep.number||idx+1} ${ep.title}`;
  document.getElementById('btnPrev').disabled = (idx === 0);
  document.getElementById('btnNext').disabled = (idx === curEps.length-1);

  // 再生
  if(ep.source) {
    audio.src = ep.source;
    audio.play().catch(()=>{});
  }
}

function playNext() { if(curIdx < curEps.length-1) playEp(curIdx+1); }
function playPrev() { if(curIdx > 0) playEp(curIdx-1); }

// ── INIT ──
loadShows();
</script>
</body>
</html>
